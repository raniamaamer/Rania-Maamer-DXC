# ─────────────────────────────────────────────────────────────
#  docker-compose.yml — React (Vite/Nginx) + Django + PostgreSQL
# ─────────────────────────────────────────────────────────────

services:

  # ── Frontend React (Nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend Django ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=dxc_backend.settings
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn dxc_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --config gunicorn.conf.py"
    restart: unless-stopped

  # ── Base de données PostgreSQL ───────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: dxc_kpi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 20010430
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dxc_kpi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ── Volumes persistants ──────────────────────────────────────
volumes:
  postgres_data:
  static_volume:
  media_volume: