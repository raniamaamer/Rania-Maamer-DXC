# ─────────────────────────────────────────────────────────────
#  Nginx config — React SPA + Reverse proxy vers Django
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Proxy vers le backend Django pour les appels API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Fichiers statiques Django (admin, DRF browsable API)
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # React SPA — toutes les routes inconnues → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques Vite (hashed filenames)
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}