apiVersion: 1

groups:
  - orgId: 1
    name: SLA Risk Alerts
    folder: SLA Alerts
    interval: 1m
    rules:

      - uid: sla-ci-critical
        title: CI Rupture SLA Critique
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sla_ci_breach_rate_pct > 8
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: CI critique rupture SLA
          description: Taux > 8% action immediate requise

      - uid: sla-ci-warning
        title: CI Rupture SLA Eleve
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sla_ci_breach_rate_pct > 5
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: CI amber taux eleve

      - uid: sla-volume-spike
        title: Pic Volume Tickets Prevu
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sla_volume_prevu_j1 > 80
              instant: true
              refId: A
        noDataState: OK
        execErrState: Error
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Volume J+1 eleve
